apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ophidian.fullname" . }}-secrets
  labels:
    {{- include "ophidian.labels" . | nindent 4 }}
type: Opaque
data:
  database-password: {{ .Values.secrets.databasePassword | default (randAlphaNum 32) | b64enc | quote }}
  redis-password: {{ .Values.secrets.redisPassword | default (randAlphaNum 16) | b64enc | quote }}
  ai-api-key: {{ .Values.secrets.aiApiKey | default "" | b64enc | quote }}
  jwt-secret: {{ .Values.secrets.jwtSecret | default (randAlphaNum 64) | b64enc | quote }}
