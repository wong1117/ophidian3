name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.2.0)'
        required: true

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      tag: ${{ steps.version.outputs.TAG }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V=${{ github.event.inputs.version }}
          else
            V=${GITHUB_REF#refs/tags/v}
          fi
          echo "VERSION=$V" >> $GITHUB_OUTPUT
          echo "TAG=v$V" >> $GITHUB_OUTPUT
          echo "Releasing $V"

  build-matrix:
    name: Build
    needs: [validate]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, darwin]
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build
        run: |
          V=${{ needs.validate.outputs.version }}
          C=${{ github.sha }}
          T=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} CGO_ENABLED=0 go build \
            -trimpath -ldflags="-s -w -X main.version=$V -X main.commit=$C -X main.buildTime=$T" \
            -o dist/ophidian-server-${{ matrix.os }}-${{ matrix.arch }} ./cmd/ophidian-server
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} CGO_ENABLED=0 go build \
            -trimpath -ldflags="-s -w -X main.version=$V -X main.commit=$C -X main.buildTime=$T" \
            -o dist/ophidian-cli-${{ matrix.os }}-${{ matrix.arch }} ./cmd/ophidian-cli
      - name: Checksums
        run: cd dist && sha256sum ophidian-* > checksums.txt
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/

  sbom:
    name: SBOM
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: dist/ophidian-${{ needs.validate.outputs.version }}.sbom.spdx.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: dist/ophidian-${{ needs.validate.outputs.version }}.sbom.spdx.json

  sign:
    name: Sign Artifacts
    needs: [validate, build-matrix]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist/
      - name: Sign binaries
        run: |
          cd dist
          for dir in */; do
            for f in $dir/ophidian-*; do
              if [ -f "$f" ]; then
                cosign sign-blob --yes --output-signature="$f.sig" --output-certificate="$f.cert" "$f"
              fi
            done
          done
      - name: Sign SBOM
        run: cosign sign-blob --yes --output-signature=dist/sbom.sig dist/ophidian-${{ needs.validate.outputs.version }}.sbom.spdx.json
      - name: Upload signatures
        uses: actions/upload-artifact@v4
        with:
          name: signatures
          path: dist/**/*.sig
          path: dist/**/*.cert

  release-notes:
    name: Release Notes
    needs: [validate]
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.cliff.outputs.content }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate changelog
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag ${{ needs.validate.outputs.tag }} --latest --strip all
        env:
          OUTPUT: CHANGELOG.md

  release:
    name: Create Release
    needs: [validate, build-matrix, sbom, sign, release-notes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*,sbom,signatures
          path: artifacts/
      - name: Package
        run: |
          mkdir -p release
          V=${{ needs.validate.outputs.version }}
          cd artifacts
          for d in dist-*/; do
            os_arch=$(echo $d | sed 's/dist-//' | sed 's/-$//')
            tar -czf ../release/ophidian-${V}-${os_arch}.tar.gz -C "$d" .
          done
          cp sbom/ophidian-*.json release/
          cp signatures/**/*.sig signatures/**/*.cert release/ 2>/dev/null || true
          cd ../release && sha256sum * > checksums.txt
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          name: Ophidian v${{ needs.validate.outputs.version }}
          body: ${{ needs.release-notes.outputs.changelog }}
          files: release/*
          draft: false
          prerelease: ${{ contains(needs.validate.outputs.version, '-') }}

  docker:
    name: Docker
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.validate.outputs.version }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Sign Docker image
        run: cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
