apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ophidian.fullname" . }}-config
  labels:
    {{- include "ophidian.labels" . | nindent 4 }}
data:
  config.yaml: |
    server:
      host: {{ .Values.config.server.host | quote }}
      port: {{ .Values.config.server.port }}
      read_timeout: {{ .Values.config.server.readTimeout }}
      write_timeout: {{ .Values.config.server.writeTimeout }}
    database:
      host: {{ .Values.config.database.host | quote }}
      port: {{ .Values.config.database.port }}
      user: {{ .Values.config.database.user | quote }}
      database: {{ .Values.config.database.database | quote }}
      ssl_mode: {{ .Values.config.database.sslMode | quote }}
      max_conns: {{ .Values.config.database.maxConns }}
    redis:
      host: {{ .Values.config.redis.host | quote }}
      port: {{ .Values.config.redis.port }}
      db: {{ .Values.config.redis.db }}
    ai:
      provider: {{ .Values.config.ai.provider | quote }}
      model: {{ .Values.config.ai.model | quote }}
      max_tokens: {{ .Values.config.ai.maxTokens }}
      temperature: {{ .Values.config.ai.temperature }}
    logging:
      level: {{ .Values.config.logging.level | quote }}
      format: {{ .Values.config.logging.format | quote }}
      output: {{ .Values.config.logging.output | quote }}
    auth:
      token_expiry: {{ .Values.config.auth.tokenExpiry }}
